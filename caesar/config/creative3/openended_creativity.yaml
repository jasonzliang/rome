# Caesar Agent Configuration File
# Only includes settings that differ from DEFAULT_CONFIG

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
Agent:
  name: CaesarExplorer
  draw_fsm: false

# ============================================================================
# CAESAR-SPECIFIC CONFIGURATION
# ============================================================================
CaesarAgent:
  # starting_url: "https://arcprize.org/arc-agi"
  # allowed_domains: ["*"]
  starting_query: "Invent a completely original business idea that doesn't exist yet."
  additional_starting_queries: 11
  max_web_searches: 30
  max_iterations: 1000
  save_graph_interval: 50

  new_think: True
  exploration_llm_config:
    model: gpt-5.2
    reasoning_effort: low

  # overwrite_role_file: config/role/self_transcend_role.txt
  # adapt_role_file: config/role/self_transcend_insights_v1.txt
  adapt_role: True

ArtifactSynthesizer:
  synthesis_iterations: 30
  synthesis_drafts: 3
  synthesis_merge_artifacts: true
  synthesis_eli5: true
  synthesis_eli5_length: [null, 450]
  synthesis_human_eval: false
  synthesis_max_length: null
  synthesis_iteration_filter: null

# ============================================================================
# LLM CONFIGURATION
# ============================================================================
OpenAIHandler:
  model: gpt-5.2
  reasoning_effort: medium

# ============================================================================
# KNOWLEDGE BASE CONFIGURATION
# ============================================================================
AgentMemory:
  enabled: true
  use_graph: false

ChromaClientManager:
  llm_model: gpt-5.2
  llm_reasoning_effort: medium

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
Logger:
  include_caller_info: "rome"
  level: "info"